<!DOCTYPE html>
<html>
  <head>
    <base target="#top">
	<link rel="icon" href="./favicon.ico">
	<link rel="stylesheet" href="./style.css">
  </head>
  <body>
	<div id="langSwitcher">
		<button id="btnEN" onclick="setLanguage('EN')">
			<svg width="20" height="14" viewBox="0 0 60 30">
				<clipPath id="s">
					<path d="M0,0 v30 h60 v-30 z"/>
				</clipPath>
				<clipPath id="t">
					<path d="M30,15 h30 v15 z v-30 h-30 z h-30 v15 z v30 h30 z"/>
				</clipPath>
				<g clip-path="url(#s)">
					<path d="M0,0 v30 h60 v-30 z" fill="#012169"/>
					<path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
					<path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4" clip-path="url(#t)"/>
					<path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>
					<path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/>
				</g>
			</svg>
		EN
		</button>
		<button id="btnFR" onclick="setLanguage('FR')">
			<svg width="20" height="14" viewBox="0 0 3 2">
				<rect width="1" height="2" x="0" fill="#0055A4"/>
				<rect width="1" height="2" x="1" fill="#FFFFFF"/>
				<rect width="1" height="2" x="2" fill="#EF4135"/>
			</svg>
		FR
		</button>
	</div>
    <div align="center"><h1 id="title"></h1></div>
    <hr>
    <div align="center"><b><p id="subtitle">PM Offer InGame @ enzo beau gosse  |  -=> New Oxford Storage <=-</b></div>
    <hr>
	<a name="top"></a>
	<div class="rayon-images">
		<div class="rayon-header-container">
			<img src="https://mrln033.github.io/FRJ-enzo-beau-gosse-For-Sale/img/storage/00_EnTete-Storage.png" class="rayon-header">
		</div>
		<div id="rayonImages"></div>
	</div>
    <div class="filter">
      <label for="rayonFilter" id="filterLabel"><span class="label-italic"></span>:</label>
      <select id="rayonFilter" id="selectCategory" onchange="applyFilter()" disabled>
		<option value=""></option>
	  </select>
    </div>

    <div id="loadingState"></div>

	<div id="emptyState">
		<div id="emptyText"></div>
	</div>

	<div class="card-container" id="cardContainer"></div>
	
	<div id="toastCalc" class="toast hidden"></div>

    <script>
	
document.addEventListener("DOMContentLoaded", () => {
  updateLanguageButtons();
  applyTranslations();
  updateFilterVisibility();

  const container = document.getElementById("rayonImages");
  container.innerHTML = "";

  // 🔥 on récupère les catégories dispo
  fetch(API_URL + "?action=categories")
    .then(res => res.json())
    .then(categories => {

      Object.keys(CATEGORY_IMAGES).forEach(cat => {

        // ❌ si catégorie vide → on skip
        if (!categories.includes(cat)) return;

        const img = document.createElement("img");
        const config = CATEGORY_IMAGES[cat];

        img.src = IMG_URL + config.normal;
        img.className = "rayon-img";
        img.dataset.category = cat;
        img.title = cat;

        // hover
        img.onmouseenter = () => {
          if (selectedCategory !== cat) {
            img.src = IMG_URL + config.hover;
          }
        };

        img.onmouseleave = () => {
          if (selectedCategory !== cat) {
            img.src = IMG_URL + config.normal;
          }
        };

        // click
        img.onclick = () => {

          if (selectedCategory === cat) {
            selectedCategory = null;
            resetCategories();
            resetRayonFilter();
            updateFilterVisibility();
            renderCards([]);
            return;
          }

          selectedCategory = cat;
          updateCategoryImages();
          updateFilterVisibility();

          loadCategoryData(cat); // 🔥 fetch items
        };

        container.appendChild(img);
      });

      isLoading = false;
	  document.getElementById("loadingState").style.display = "none";

	  renderCards([]);
    })
    .catch(err => {
      console.error("Erreur chargement catégories:", err);
    });
});


	let currentLang = localStorage.getItem("lang");

	if (!currentLang) {
		currentLang = "EN";
		localStorage.setItem("lang", currentLang);
	}
	
	const API_URL = "https://script.google.com/macros/s/AKfycbyRaPJqnyGXx38AXYxkjV8MLfFBY2vdRNmwr9KPA1XMVMWd1SKQwnWirE8BeGmU2Cta/exec";
	const IMG_URL = "https://mrln033.github.io/FRJ-enzo-beau-gosse-For-Sale/img/"
		
	let data = [];
	let selectedCategory = null;
	let isLoading = true;
	let lastRenderedItems = [];
	

		
	function setLanguage(lang) {
		currentLang = lang;

		// sauvegarde
		localStorage.setItem("lang", lang);

		// mise à jour UI
		updateLanguageButtons();
		applyTranslations();
		renderCards(lastRenderedItems);
	}
	
	const TRANSLATIONS = {
		EN: {
			title: "[FRJ] - enzo beau gosse = FOR SALE",
			subtitle: "PM Offer InGame @ enzo beau gosse  |  -=> New Oxford Storage <=-",
			
			loadingState: "Loading in progress...",

			filterLabel: "Filter by RAYON",
			selectCategory: "First, select Inventory Category",
			all: "All",

			quantity: "Quantity",
			unitPrice: "Unit Price",
			total: "Total TT",
			calcSell: "Selling Price",
			
			close: "Close",
			
			empty: `
				<h2>Welcome to my Inventory</h2>

				<p>
				This page allows you to browse all items currently available for sale.
				</p>
				<p>
				To get started, <strong>select an inventory category</strong> above.
				</p>

				<ul>
					<li>Browse items by inventory category</li>
					<li>Filter by "Rayon"</li>
					<li>Click on an item's name to open the wiki</li>
					<li>All (L) items are Full TT! un(L) items may need repairs, but the displayed value always corresponds to Full TT</li>
					<li>MU values are updated regularly (hover to see the last update date): they gradually fade and disappear after 7 days</li>
				</ul>

				<p>
				<strong>Tip:</strong> you can click again on a category to reset your selection.
				</p>
  `
			},

		FR: {
			title: "[FRJ] - enzo beau gosse = A VENDRE",
			subtitle: "Faites une offre en jeu @ enzo beau gosse  |  -=> New Oxford Storage <=-",
			
			loadingState: "Chargement en cours...",

			filterLabel: "Filtrer par RAYON",
			selectCategory: "Sélectionnez une catégorie d'inventaire",
			all: "Tous",

			quantity: "Quantité",
			unitPrice: "Prix unitaire",
			total: "Total TT",
			calcSell: "Prix de Vente",
			
			close: "Fermer",
			
			empty: `
				<h2>Bienvenue dans mon Inventaire</h2>

				<p>
				Cette page vous permet de consulter tous les objets actuellement en vente.
				</p>

				<p>
				Pour commencer, <strong>sélectionnez une catégorie d'inventaire</strong> ci-dessus.
				</p>

				<ul>
				<li>Parcourez les objets par catégorie d'inventaire</li>
				<li>Filtrez par "Rayon"</li>
				<li>Cliquez sur le nom d'un objet pour ouvrir le wiki</li>
				<li>Tous les items (L) sont Full TT !! Concernant les items non-(L), ils peuvent être à réparer, mais c'est bien la valeur Full TT qui est affichée.</li>
				<li>Les MU sont actualisés régulièrement (survolez la ligne pour afficher la date de mise à jour) : ils s'effacent progressivement pour disparaitre après 7 jours<br><i><b>Membres FRJ =</b> remise de 50% du MU pour tous les membres</i></li>
				</ul>

				<p>
				<strong>Astuce :</strong> vous pouvez recliquer sur la catégorie sélectionnée pour afficher ce message à nouveau.
				</p>
			`
		}
	};
		
	const CATEGORY_IMAGES = {
		"MONEY AND DEEDS": {
			normal: "storage/01_Money-and-Deeds.png",
			hover: "storage/01_Money-and-Deeds_Hover.png",
			selected: "storage/01_Money-and-Deeds_Select.png"
		},
		"CLOTHES": {
			normal: "storage/02_Clothes.png",
			hover: "storage/02_Clothes_Hover.png",
			selected: "storage/02_Clothes_Select.png"
		},
		"ARMORS": {
			normal: "storage/03_Armors.png",
			hover: "storage/03_Armors_Hover.png",
			selected: "storage/03_Armors_Select.png"
		},
		"WEAPONS": {
			normal: "storage/04_Weapons.png",
			hover: "storage/04_Weapons_Hover.png",
			selected: "storage/04_Weapons_Select.png"
		},
		"TOOLS": {
			normal: "storage/05_Tools.png",
			hover: "storage/05_Tools_Hover.png",
			selected: "storage/05_Tools_Select.png"
		},
		"MINDFORCE": {
			normal: "storage/06_Mindforce.png",
			hover: "storage/06_Mindforce_Hover.png",
			selected: "storage/06_Mindforce_Select.png"
		},
		"MATERIALS": {
			normal: "storage/07_Materials.png",
			hover: "storage/07_Materials_Hover.png",
			selected: "storage/07_Materials_Select.png"
		},
		"RESOURCES": {
			normal: "storage/08_Resources.png",
			hover: "storage/08_Resources_Hover.png",
			selected: "storage/08_Resources_Select.png"
		},
		"BLUEPRINTS": {
			normal: "storage/09_Blueprints.png",
			hover: "storage/09_Blueprints_Hover.png",
			selected: "storage/09_Blueprints_Select.png"
		},
		"VEHICLES": {
			normal: "storage/10_Vehicles.png",
			hover: "storage/10_Vehicles_Hover.png",
			selected: "storage/10_Vehicles_Select.png"
		},
		"MISCELLANEOUS": {
			normal: "storage/11_Miscellaneous.png",
			hover: "storage/11_Miscellaneous_Hover.png",
			selected: "storage/11_Miscellaneous_Select.png"
		}
	};
	
	function updateLanguageButtons() {
		document.getElementById("btnEN").classList.remove("active");
		document.getElementById("btnFR").classList.remove("active");

		if (currentLang === "EN") {
			document.getElementById("btnEN").classList.add("active");
		} else {
			document.getElementById("btnFR").classList.add("active");
		}
	}
	
	function t(key) {
		return TRANSLATIONS[currentLang][key] || key;
	}
	
	function applyTranslations() {
		document.getElementById("title").innerText = t("title");
		document.getElementById("subtitle").innerText = t("subtitle");
		document.getElementById("loadingState").innerText = t("loadingState");

		document.getElementById("filterLabel").innerHTML =
			`<span class="label-italic">${t("filterLabel")}</span>:`;

		// Select
		const select = document.getElementById("rayonFilter");

		if (!selectedCategory) {
			select.innerHTML = `<option value="">${t("selectCategory")}</option>`;
		}
	}

	function formatRayon(rayon) {
		if (!rayon) return "";

		return rayon
			.toLowerCase()
			.split(" ")
			.map(word => word.charAt(0).toUpperCase() + word.slice(1))
			.join(" ");
		}

function loadCategoryData(category) {
  isLoading = true;

  // 🔥 cacher filtre pendant chargement
  document.querySelector(".filter").style.display = "none";

  // 🔥 afficher loading seul
  document.getElementById("loadingState").style.display = "block";

  // 🔥 vider affichage
  renderCards([]);

  fetch(API_URL + "?category=" + encodeURIComponent(category))
    .then(res => res.json())
    .then(response => {
      data = response;

      isLoading = false;

      // 🔥 cacher loading
      document.getElementById("loadingState").style.display = "none";

      // 🔥 remettre filtre
      updateFilterVisibility();

      updateRayonFilter();
      applyFilter();
    })
    .catch(err => {
      console.error("Erreur chargement data:", err);
      isLoading = false;
    });
}
	function updateCategoryImages() {
		document.querySelectorAll(".rayon-img").forEach(img => {
			const cat = img.dataset.category;
			const config = CATEGORY_IMAGES[cat];

			if (cat === selectedCategory) {
				img.src = IMG_URL + config.selected;
			} else {
				img.src = IMG_URL + config.normal;
			}
		});
	}

	function resetCategories() {
		document.querySelectorAll(".rayon-img").forEach(img => {
			const cat = img.dataset.category;
			img.src = IMG_URL + CATEGORY_IMAGES[cat].normal;
		});
	}

	function updateRayonFilter() {
		const select = document.getElementById('rayonFilter');

		// reset
		select.innerHTML = '';
		select.disabled = false;

		// option ALL
		const allOption = document.createElement('option');
		allOption.value = "";
		allOption.textContent = t("all");
		select.appendChild(allOption);

		// filtrer data par catégorie
		const filtered = data.filter(item => item.STORAGE === selectedCategory);

		const rayons = [...new Set(filtered.map(item => item.RAYON))].sort();

		rayons.forEach(rayon => {
			const option = document.createElement('option');
			option.value = rayon;
			option.textContent = formatRayon(rayon);
			select.appendChild(option);
		});

		// valeur par défaut = ALL
		select.value = "";
	}

	function resetRayonFilter() {
		const select = document.getElementById('rayonFilter');

		select.innerHTML = '<option value="">${t("selectCategory")}</option>';
		select.disabled = true;
	}

	// Filtre par rayon et quantité
	function applyFilter() {
		if (isLoading) return;
		updateFilterVisibility();
		
		const selectedRayon = document.getElementById('rayonFilter').value;

		let filtered = data;

		if (!selectedCategory) {
			renderCards([]);
			scrollToTop();
			return;
		}

		if (selectedCategory) {
			filtered = filtered.filter(item => item.STORAGE === selectedCategory);
		}

		if (selectedRayon) {
			filtered = filtered.filter(item => item.RAYON === selectedRayon);
		}

		filtered = filtered.filter(item => item.QUANTITE && item.QUANTITE > 0);

		renderCards(filtered);
		scrollToTop();
	}

	function selectRayon(rayon) {
        // Met à jour le select
        const select = document.getElementById('rayonFilter');
        select.value = rayon;

        // Applique le filtre
        applyFilter();
	}
	  
	function formatDateMU(dateStr) {
		if (!dateStr) return { display: "", full: "" };

		const d = new Date(dateStr);
		const now = new Date();

		const diffMs = now - d;
		const diffHours = diffMs / (1000 * 60 * 60);
		const diffMinutes = diffMs / (1000 * 60);

		// Tooltip complet
		const full = d.toLocaleString("fr-FR", {
			year: "numeric",
			month: "2-digit",
			day: "2-digit",
			hour: "2-digit",
			minute: "2-digit",
			second: "2-digit"
		});

		let display = "";

		if (diffHours < 24) {
			if (diffHours >= 1) {
				display = `il y a ${Math.floor(diffHours)}h`;
			} else {
				const mins = Math.max(1, Math.floor(diffMinutes));
			display = `il y a ${mins} min`;
			}
		} else {
			display = d.toLocaleString("fr-FR", {
			year: "numeric",
			month: "2-digit",
			day: "2-digit",
			hour: "2-digit",
			minute: "2-digit"
			});
		}

		return { display };
	}
	
	function getMUColor(dateStr) {
		if (!dateStr) return "#000";

		const d = new Date(dateStr);
		const now = new Date();

		const diffMs = now - d;
		const days = diffMs / (1000 * 60 * 60 * 24);

		// > 7 jours → on ne doit plus afficher
		if (days > 7) return null;

		// < 1 jour → noir
		if (days <= 1) return "#000000";

		// Dégradé entre 1 et 8 jours
		const ratio = (days - 1) / 7; // 0 → 1

		// 0 = noir (0), 1 = gris clair (~200)
		const gray = Math.round(0 + ratio * 200);

		return `rgb(${gray}, ${gray}, ${gray})`;
	}

	// Génère les cards HTML
	function renderCards(items) {
        const container = document.getElementById('cardContainer');
		const emptyState = document.getElementById('emptyState');
		const loadingState = document.getElementById('loadingState');

		lastRenderedItems = items;
		container.innerHTML = '';
		
		// ⏳ Affichage loading prioritaire
		if (isLoading) {
			loadingState.style.display = "block";

			// ❌ NE PAS afficher empty pendant loading
			emptyState.style.display = "none";

			return;
		}
		
		// 📘 Message explicatif si aucune catégorie sélectionnée
		if (!selectedCategory || items.length === 0) {

			document.getElementById("emptyText").innerHTML = t("empty");
	
			emptyState.style.display = "block";
			return;

		} else {
			emptyState.style.display = "none";
		}

        // Tri alphabétique par ITEM
        items.sort((a,b) => a.ITEM.localeCompare(b.ITEM));

        items.forEach(item => {
			const card = document.createElement('div');
			card.className = 'card';

			// Image ou placeholder
			let imageSrc = "";

			// Vérifie si IMAGE est valide
			if (item.IMAGE && item.IMAGE !== '--') {

				// Si ce n'est PAS une URL complète → on préfixe avec IMG_URL
				if (!item.IMAGE.startsWith("http")) {
					imageSrc = IMG_URL + item.IMAGE;
				} else {
					imageSrc = item.IMAGE;
				}
			}

			const imgHTML = imageSrc
				? `<div class="image-container">
					<img src="${imageSrc}" alt="${item.ITEM}">
				</div>`
				: `<div class="image-container" style="background:#eee;">No image</div>`;

			// Affichage prix et total avec 2 décimales + monnaie "peds"
			let prixUnitaire = "--";
			let total = "--";

			if (item.PRIX_UNITAIRE !== "" && item.PRIX_UNITAIRE != null) {
				prixUnitaire = formatNumber(item.PRIX_UNITAIRE);          // dynamique
				total = (parseFloat(item.TOTAL) || 0).toFixed(2);         // toujours 2 décimales
			}

			// Génération du titre ITEM
			let itemTitle = "";
			if (item.LIEN_WIKI && item.LIEN_WIKI.trim() !== "") {
				itemTitle = `<a href="${item.LIEN_WIKI}" target="_blank">${item.ITEM}</a>`;
			} else {
				itemTitle = `${item.ITEM}`;
			}

			let rayonHTML = "";
			const selectedRayon = document.getElementById('rayonFilter').value;
			if (!selectedRayon) { 
				// Affiche Rayon avec lien cliquable
				rayonHTML = `<p><span class="label-italic">Rayon</span>: 
					<a href="#" class="rayon-link" onclick="selectRayon('${item.RAYON}'); return false;">
                          ${item.RAYON}
                    </a>
                    </p>`;
			}

			let muHTML = "";
			let calculatorHTML = "";

			// Afficher uniquement si MU existe et n'est pas vide
			if (item.MU !== "" && item.MU != null) {

				const color = getMUColor(item.DATE_MU);

				// Si trop ancien → on n'affiche PAS le MU mais on garde la card
				if (color !== null) {
					const dateFormatted = formatDateMU(item.DATE_MU);

					muHTML = `
					<p title="${dateFormatted.display}">
						<span class="MU-style" style="color:${color}">
						MU: ${item.MU}
						</span>
					</p>
					`;
				}
			}
				
			// 👉 afficher l'icône SEULEMENT si prix + MU existent + MU %
			const hasPrice = item.PRIX_UNITAIRE !== "" && item.PRIX_UNITAIRE != null && !isNaN(item.PRIX_UNITAIRE);
			const hasMU = item.MU !== "" && item.MU != null;
			const isPercentMU = typeof item.MU === "string" && item.MU.includes("%");

			if (hasPrice && hasMU && isPercentMU) {
				calculatorHTML = `
					<div class="calc-icon"
						onclick='openCalculator(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
						🧮
					</div>
				`;
			}
			
			card.innerHTML = `
				${imgHTML}
				<h3>${itemTitle}</h3>
				${rayonHTML}
				<p><span class="label-italic">${t("quantity")}</span>: ${item.QUANTITE}</p>
				<p><span class="label-italic">${t("unitPrice")}</span>: ${prixUnitaire} peds</p>
				<p><span class="label-italic">${t("total")}</span>: ${total} peds</p>
				${muHTML}
				${calculatorHTML}
			`;

			container.appendChild(card);
		});
	}
	
	function formatNumber(value) {
        if (value === "" || value == null) return "";
        const str = value.toString();
        if (!str.includes(".")) return str + ".00";
        const decimals = str.split(".")[1].length;
        if (decimals === 1) return str + "0";
        return str; // 2 décimales ou + → on garde tel quel
	}
	  
	function scrollToTop() {
		const topAnchor = document.querySelector('a[name="top"]');
		if (topAnchor) {
			topAnchor.scrollIntoView({ behavior: "smooth" });
		}
	}
	  
	function updateFilterVisibility() {
		const filter = document.querySelector(".filter");

		if (selectedCategory) {
			filter.style.display = "flex";
		} else {
			filter.style.display = "none";
		}
	}

	function openCalculator(item) {
		const toast = document.getElementById("toastCalc");

		const prix = parseFloat(item.PRIX_UNITAIRE) || 0;
		const mu = item.MU || "";

		toast.innerHTML = `
			<h3>${item.ITEM}</h3>

			<p>
			${t("quantity")}:
			<input type="number" id="calcQty" value="${item.QUANTITE}" min="1">
			</p>

			<p>${t("unitPrice")}: ${prix.toFixed(2)} peds</p>

			<p>TT: <span id="calcTT">${(item.QUANTITE * prix).toFixed(2)}</span> peds</p>

			<p>MU: ${mu}</p>

			<p>${t("calcSell")}: <span id="calcSell">--</span></p>

			<button onclick="closeToast()">${t("close")}</button>
		`;

		toast.classList.remove("hidden");

		// recalcul live
		document.getElementById("calcQty").addEventListener("input", () => {
			updateCalc(prix, mu);
		});

		updateCalc(prix, mu);
	}
	
	function updateCalc(prix, muStr) {
		const qty = parseFloat(document.getElementById("calcQty").value) || 0;

		const tt = qty * prix;
		document.getElementById("calcTT").innerText = tt.toFixed(2);

		// Extraction MU (ex: "105%" → 1.05)
		let muValue = 1;

		if (muStr && muStr.includes("%")) {
			muValue = parseFloat(muStr.replace("%", "")) / 100;
		}

		const sell = tt * muValue;

		document.getElementById("calcSell").innerText = sell.toFixed(2) + " peds";
	}
	
	function closeToast() {
		document.getElementById("toastCalc").classList.add("hidden");
	}


	document.addEventListener("click", (e) => {
		const toast = document.getElementById("toastCalc");
		if (!toast.contains(e.target) && !e.target.classList.contains("calc-icon")) {
			toast.classList.add("hidden");
		}
	});
	
    </script>
  </body>
</html>
